<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate LLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app">
        <div id="notification-toast" class="hidden"></div>
        
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <h2>Generating Verdict...</h2>
            <p>Please wait while the AI judge decides the outcome.</p>
        </div>
        
        <header>
            <div class="logo">
                <span class="logo-icon">⚖️</span>
                <h1>Debate LLM</h1>
            </div>
            <div id="user-info" class="hidden">
                <button id="logout-btn" class="btn btn-secondary btn-sm">Sign Out</button>
            </div>
        </header>

        <main>
            <section id="auth-view" class="view active">
                <div class="glass-card auth-container">
                    <div class="auth-tabs">
                        <button id="tab-login" class="auth-tab active">Login</button>
                        <button id="tab-register" class="auth-tab">Register</button>
                    </div>

                    <form id="login-form" class="auth-form active">
                        <h2>Welcome Back</h2>
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn btn-primary full-width">Sign In</button>
                    </form>

                    <form id="register-form" class="auth-form">
                        <h2>Create Account</h2>
                        <div class="form-group">
                            <label for="reg-name">Name</label>
                            <input type="text" id="reg-name" required placeholder="Choose a username">
                        </div>
                        <div class="form-group">
                            <label for="reg-email">Email</label>
                            <input type="email" id="reg-email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Password</label>
                            <input type="password" id="reg-password" required placeholder="Create a password">
                        </div>
                        <button type="submit" class="btn btn-primary full-width">Sign Up</button>
                    </form>
                </div>
            </section>

            <section id="dashboard-view" class="view">
                <div class="dashboard-container">
                    <div class="glass-card topic-card">
                        <h2>Start a New Debate</h2>
                        <div class="topic-generator">
                            <button id="generate-topic-btn" class="btn btn-secondary">
                                <span class="icon">🎲</span> Generate Topic
                            </button>
                            <div class="form-group mt-15">
                                <label for="debate-topic">Debate Topic</label>
                                <input type="text" id="debate-topic" placeholder="Generate or type a topic..." required>
                            </div>
                        </div>
                        
                        <div class="role-selection">
                            <p class="role-label">Choose your stance:</p>
                            <div class="role-options">
                                <label class="role-card">
                                    <input type="radio" name="debate-role" value="For" checked>
                                    <div class="role-content">
                                        <span class="role-icon">👍</span>
                                        <span class="role-name">For</span>
                                    </div>
                                </label>
                                <label class="role-card">
                                    <input type="radio" name="debate-role" value="Against">
                                    <div class="role-content">
                                        <span class="role-icon">👎</span>
                                        <span class="role-name">Against</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <button id="start-debate-btn" class="btn btn-primary full-width mt-20">
                            Start Debate Session
                        </button>
                    </div>
                </div>
            </section>

            <section id="debate-view" class="view">
                <div class="debate-container glass-card">
                    <div class="debate-header">
                        <div class="debate-info">
                            <h3>Active Topic</h3>
                            <p id="active-topic-display">Loading topic...</p>
                        </div>
                        <div class="debate-actions">
                            <span id="user-role-badge" class="badge badge-info">Role: For</span>
                            <button id="end-debate-btn" class="btn btn-danger btn-sm">End Debate</button>
                        </div>
                    </div>
                    
                    <div id="chat-history" class="chat-history">
                        <div class="message system startup">
                            <div class="message-content">
                                Debate has started. Please present your opening argument.
                            </div>
                        </div>
                    </div>

                    <form id="chat-form" class="chat-input-area">
                        <textarea id="chat-input" placeholder="Type your argument..." required></textarea>
                        <button type="submit" id="send-btn" class="btn btn-primary send-btn">
                            <span>Send</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                              <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </section>

            <section id="verdict-view" class="view">
                <div class="verdict-container glass-card">
                    
                    <div class="verdict-content" id="verdict-content-box">
                        <div class="verdict-winner" id="verdict-winner-box">
                            <h3>Winner</h3>
                            <h2 id="verdict-winner-text">...</h2>
                        </div>
                        <div class="verdict-score-box">
                            <span>Your Score:</span>
                            <strong id="verdict-score" class="verdict-score">0/10</strong>
                        </div>
                        <div id="verdict-text" class="verdict-text markdown-body"></div>
                    </div>

                    <div class="verdict-actions">
                        <button id="back-to-dashboard-btn" class="btn btn-primary">Return to Dashboard</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/main.js"></script>
</body>
</html>
